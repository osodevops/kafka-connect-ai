name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  validate-tag:
    name: Validate Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.parse.outputs.tag }}
      version: ${{ steps.parse.outputs.version }}
      is_prerelease: ${{ steps.parse.outputs.is_prerelease }}
    steps:
      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" =~ -(alpha|beta|rc) ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-test:
    name: Build & Test
    needs: validate-tag
    uses: ./.github/workflows/ci.yml

  publish-maven-central:
    name: Publish to Maven Central
    needs: [validate-tag, build-and-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Set release version
        run: mvn versions:set -DnewVersion=${{ needs.validate-tag.outputs.version }} -DgenerateBackupPoms=false -B

      - name: Build, sign, and verify
        run: mvn clean verify -Prelease -DskipTests -B
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Deploy to Maven Central
        run: mvn deploy -Prelease -DskipTests -B
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  package-and-release:
    name: Package & GitHub Release
    needs: [validate-tag, build-and-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download uber JAR
        uses: actions/download-artifact@v4
        with:
          name: kafka-connect-ai-uber-jar
          path: staging/

      - name: Prepare release archive
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"
          DIST_DIR="kafka-connect-ai-${VERSION}"
          mkdir -p "${DIST_DIR}"
          cp staging/kafka-connect-ai-connect-*-all.jar "${DIST_DIR}/"
          cp LICENSE "${DIST_DIR}/" 2>/dev/null || echo "No LICENSE file found" > "${DIST_DIR}/LICENSE"
          zip -r "kafka-connect-ai-${VERSION}.zip" "${DIST_DIR}"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: staging/
          output-file: kafka-connect-ai-${{ needs.validate-tag.outputs.version }}.sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: kafka-connect-ai-${{ needs.validate-tag.outputs.version }}.zip

      - name: Create GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: kafka-connect-ai-${{ needs.validate-tag.outputs.version }}.zip
          asset_name: kafka-connect-ai-${{ needs.validate-tag.outputs.version }}.zip
          tag: ${{ needs.validate-tag.outputs.tag }}
          release_name: kafka-connect-ai ${{ needs.validate-tag.outputs.tag }}
          prerelease: ${{ needs.validate-tag.outputs.is_prerelease }}
          body: |
            ## kafka-connect-ai ${{ needs.validate-tag.outputs.tag }}

            ### Maven Central

            ```xml
            <dependency>
                <groupId>sh.oso</groupId>
                <artifactId>kafka-connect-ai-connect</artifactId>
                <version>${{ needs.validate-tag.outputs.version }}</version>
                <classifier>all</classifier>
            </dependency>
            ```

            ### Installation

            1. Download `kafka-connect-ai-${{ needs.validate-tag.outputs.version }}.zip`
            2. Extract the ZIP
            3. Copy the uber JAR into a directory on your Kafka Connect `plugin.path`
            4. Restart your Connect workers

            ### Docker

            ```bash
            docker pull ghcr.io/osodevops/kafka-connect-ai:${{ needs.validate-tag.outputs.version }}
            ```

      - name: Upload SBOM to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: kafka-connect-ai-${{ needs.validate-tag.outputs.version }}.sbom.spdx.json
          asset_name: kafka-connect-ai-${{ needs.validate-tag.outputs.version }}.sbom.spdx.json
          tag: ${{ needs.validate-tag.outputs.tag }}

  docker:
    name: Docker Image
    needs: [validate-tag, build-and-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download uber JAR
        uses: actions/download-artifact@v4
        with:
          name: kafka-connect-ai-uber-jar
          path: docker/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/osodevops/kafka-connect-ai
          tags: |
            type=semver,pattern={{version}},value=${{ needs.validate-tag.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.validate-tag.outputs.tag }}
            type=raw,value=latest,enable=${{ needs.validate-tag.outputs.is_prerelease == 'false' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker/
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
