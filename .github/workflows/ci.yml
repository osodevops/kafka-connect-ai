name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile and run unit tests
        run: mvn clean test -B

      - name: Package uber JAR
        run: mvn package -pl kafka-connect-ai-connect -am -B -DskipTests

      - name: Upload uber JAR
        uses: actions/upload-artifact@v4
        with:
          name: kafka-connect-ai-uber-jar
          path: kafka-connect-ai-connect/target/kafka-connect-ai-connect-*-all.jar
          retention-days: 7

  integration-test:
    name: Integration Tests
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run integration tests
        run: mvn verify -pl kafka-connect-ai-integration-tests -am -B

  e2e-test:
    name: E2E Tests (Live OpenAI)
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run E2E tests with live OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: mvn verify -pl kafka-connect-ai-integration-tests -am -B -Dit.test=LiveOpenAiPipelineIT
