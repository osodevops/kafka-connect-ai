name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn clean verify -pl kafka-connect-ai-api,kafka-connect-ai-adapter-http,kafka-connect-ai-adapter-jdbc,kafka-connect-ai-adapter-kafka,kafka-connect-ai-connect -am -B

      - name: Upload uber JAR
        uses: actions/upload-artifact@v4
        with:
          name: kafka-connect-ai-uber-jar
          path: kafka-connect-ai-connect/target/kafka-connect-ai-connect-*-all.jar
          retention-days: 7

  integration-test:
    name: Integration Tests
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Download uber JAR
        uses: actions/download-artifact@v4
        with:
          name: kafka-connect-ai-uber-jar
          path: kafka-connect-ai-connect/target/

      - name: Run integration tests
        run: mvn verify -pl kafka-connect-ai-integration-tests -am -B
